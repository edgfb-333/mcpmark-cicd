name: PR Automation Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run ESLint
        id: eslint
        run: npm run lint
      - name: Run Prettier Check
        id: prettier
        run: npx prettier --check .
      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const eslintOutput = `${{ steps.eslint.outputs.stdout || 'No ESLint issues found' }}`;
            const prettierOutput = `${{ steps.prettier.outputs.stdout || 'No Prettier formatting issues found' }}`;
            const comment = `## Code Quality Report\n\n### ESLint\n${eslintOutput}\n\n### Prettier\n${prettierOutput}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  testing-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run Tests with Coverage
        id: test
        run: npm test -- --coverage
      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const coverageOutput = `${{ steps.test.outputs.stdout || 'Test coverage report not available' }}`;
            const comment = `## Test Coverage Report\n\n${coverageOutput}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run Dependency Vulnerability Check
        id: npm-audit
        run: npm audit --json > npm-audit.json || true
      - name: Run Secret Scan
        id: secret-scan
        uses: trufflesecurity/trufflehog@v3
        with:
          path: .
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          output: json
      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const npmAudit = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
            const secretScan = JSON.parse(fs.readFileSync('trufflehog-results.json', 'utf8'));
            const vulnerabilities = npmAudit.metadata?.vulnerabilities || { critical: 0, high: 0, moderate: 0, low: 0 };
            const secretsFound = secretScan.length > 0 ? secretScan.map(s => `- ${s.SourceName}: ${s.DetectorName}`).join('\n') : 'No secrets found';
            const comment = `## Security Scan Report\n\n### Vulnerabilities\n- Critical: ${vulnerabilities.critical}\n- High: ${vulnerabilities.high}\n- Moderate: ${vulnerabilities.moderate}\n- Low: ${vulnerabilities.low}\n\n### Dependencies\nAudit completed. See npm-audit.json for details.\n\n### Secrets Scan\n${secretsFound}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  build-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Application
        id: build
        run: npm run build
      - name: Validate Endpoints
        id: endpoints
        run: |
          npm start &
          sleep 10
          curl -I http://localhost:3000 || echo "Endpoint validation failed"
      - name: Create Deployment Preview Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
      - name: Post Build Validation Status
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = `${{ steps.build.outcome === 'success' ? 'Build succeeded' : 'Build failed' }}`;
            const endpointStatus = `${{ steps.endpoints.outputs.stdout || 'Endpoint validation not performed' }}`;
            const comment = `## Build Validation\n\n- Build Status: ${buildStatus}\n- Endpoint Validation: ${endpointStatus}\n\nDeployment preview artifacts uploaded as build-artifacts.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });